<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Banana Math Quest</title>

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0f172a;
      font-family: Arial, sans-serif;
      color:#ffffff;
    }

    .container{
      width:600px;
      background:#1e293b;
      padding:40px;
      border-radius:12px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
      text-align:center;
    }

    h1{
      margin-top:0;
      margin-bottom:15px;
    }

    p{
      color:#cbd5e1;
      margin-bottom:25px;
      line-height:1.5;
    }

    button{
      padding:12px 20px;
      font-size:16px;
      border:none;
      border-radius:6px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:#2563eb;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Banana Math Quest</h1>

    <p>
      A web-based educational math game powered by the Banana API.
      Each round generates a new puzzle dynamically.
      This is a progress prototype version.
    </p>

    <a href="/game">
      <button>Start Game (Guest)</button>
    </a>
  </div>
</body>
</html>
